<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シナジー ランキング</title>
<link rel="stylesheet" href="viewer_shared.css?v=38">
<style>
.trend-section { margin-bottom: 32px; }
.trend-table { border-collapse: collapse; font-size: 13px; }
.trend-table th, .trend-table td { padding: 6px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; vertical-align: middle; }
.trend-table th { color: var(--accent); text-align: center; background: var(--panel); }
.trend-table th.col-left { text-align: left; }
.trend-cell { position: relative; min-width: 120px; text-align: right; }
.trend-bar { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); opacity: 0.18; }
.trend-val { position: relative; font-weight: 600; }
.trend-delta { font-size: 11px; margin-left: 6px; position: relative; }
.trend-delta.up { color: #6fd38b; }
.trend-delta.dn { color: #ff6b6b; }
.trend-delta.flat { color: var(--muted); }
.trend-empty { color: var(--muted); text-align: center; }
.trend-label img { width: 18px; height: 18px; border-radius: 4px; vertical-align: middle; margin-right: 3px; }
.trend-label .sep { color: var(--muted); margin: 0 4px; }
</style>
</head>
<body>

<nav class="nav">
  <a href="viewer.html">ランキング</a>
  <a href="summary.html">統計</a>
  <a href="trend.html" class="active">パッチ比較</a>
</nav>

<div class="panel">
  <div class="meta" id="meta"></div>
  <div id="sections"></div>
</div>

<script src="viewer_shared.js?v=38"></script>
<script>
const PATCHES = [
  { key: 'light_heavyweight', label: 'LH 7.05' },
  { key: 'cruiserweight',     label: 'クルーザー 7.2' },
  { key: 'heavyweight',       label: 'ヘビー 7.4' },
];

// 各ボスのrank=1（最大値）を tier×e1×e2 でグループ化して平均する
function groupAvgOfMax(rows, e1Key, e2Key) {
  const map = new Map();
  for (const r of rows) {
    const k = `${r.tier}|${r[e1Key]}|${r[e2Key]}`;
    if (!map.has(k)) map.set(k, { tier: r.tier, e1: r[e1Key], e2: r[e2Key], sum: 0, n: 0 });
    const e = map.get(k);
    e.sum += parseFloat(r.dps_value);
    e.n++;
  }
  return Array.from(map.values()).map(e => ({ tier: e.tier, e1: e.e1, e2: e.e2, avg: e.sum / e.n }));
}

function normByTier(entries) {
  const maxes = {};
  for (const e of entries) {
    if (!maxes[e.tier] || e.avg > maxes[e.tier]) maxes[e.tier] = e.avg;
  }
  return entries.map(e => ({ ...e, norm: maxes[e.tier] ? e.avg / maxes[e.tier] * 100 : 0 }));
}

function img(src) {
  return src ? `<img src="${src}">` : '';
}

function renderTable(entries, icon1Fn, label1Fn, icon2Fn, label2Fn) {
  const sortPatch = PATCHES[PATCHES.length - 1].key;

  const byEntity = new Map();
  for (const e of entries) {
    const k = e.e1 + '|' + e.e2;
    if (!byEntity.has(k)) byEntity.set(k, { e1: e.e1, e2: e.e2, pv: {} });
    byEntity.get(k).pv[e.tier] = e.norm;
  }

  const rows = Array.from(byEntity.values())
    .sort((a, b) => (b.pv[sortPatch] || 0) - (a.pv[sortPatch] || 0));

  const thead = `<tr>
    <th class="col-left" style="min-width:220px"></th>
    ${PATCHES.map(p => `<th>${p.label}</th>`).join('')}
  </tr>`;

  const tbody = rows.map(({ e1, e2, pv }) => {
    const labelHtml = `<span class="trend-label">${img(icon1Fn(e1))}${label1Fn(e1)}<span class="sep">·</span>${img(icon2Fn(e2))}${label2Fn(e2)}</span>`;
    const cells = PATCHES.map((p, i) => {
      const v = pv[p.key];
      if (v === undefined) return '<td class="trend-empty">-</td>';
      const prev = i > 0 ? pv[PATCHES[i - 1].key] : null;
      const d = prev != null ? v - prev : null;
      const dHtml = d != null
        ? `<span class="trend-delta ${Math.abs(d) < 1 ? 'flat' : d > 0 ? 'up' : 'dn'}">${d > 0 ? '+' : ''}${d.toFixed(0)}</span>`
        : '';
      return `<td class="trend-cell">
        <div class="trend-bar" style="width:${v.toFixed(1)}%"></div>
        <span class="trend-val">${v.toFixed(0)}%</span>${dHtml}
      </td>`;
    }).join('');
    return `<tr><td class="col-left">${labelHtml}</td>${cells}</tr>`;
  }).join('');

  return `<div class="tablewrap"><table class="trend-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
}

async function main() {
  document.getElementById('meta').textContent = '読み込み中...';
  let given, taken;
  try {
    [given, taken] = await Promise.all([fetchCsvRows('given'), fetchCsvRows('taken')]);
  } catch {
    document.getElementById('meta').textContent = '読み込みに失敗しました。';
    return;
  }

  // 本人ランクのログ かつ 各ボス×ジョブ×バフ内のトップ(rank=1)のみ使用
  const givenMax = given.filter(r => r.is_own_ranked_log === 'True' && r.rank === '1');
  const takenMax = taken.filter(r => r.is_own_ranked_log === 'True' && r.rank === '1');

  const givenNorm = normByTier(groupAvgOfMax(givenMax, 'job', 'buff_given'));
  const takenNorm = normByTier(groupAvgOfMax(takenMax, 'job', 'buff_received'));

  document.getElementById('meta').textContent = '';
  document.getElementById('sections').innerHTML = `
    <div class="trend-section">
      <h2>与シナジー トレンド（ジョブ × シナジー別）</h2>
      <p class="note">各ボスのトップDPS(rank=1)をパッチ内のボス間で平均し、パッチ内最大を100%として正規化。ヘビー級順。</p>
      ${renderTable(givenNorm,
        j => jobMeta(j).icon, j => jobMeta(j).jp,
        b => BUFF_ICON[b] || '', b => buffJp(b))}
    </div>
    <div class="trend-section">
      <h2>被シナジー トレンド（受けジョブ × バフ別）</h2>
      <p class="note">各ボスのトップDPS(rank=1)をパッチ内のボス間で平均し、パッチ内最大を100%として正規化。ヘビー級順。</p>
      ${renderTable(takenNorm,
        j => jobMeta(j).icon, j => jobMeta(j).jp,
        b => BUFF_ICON[b] || '', b => buffJp(b))}
    </div>
  `;
}

main();
</script>
</body>
</html>
