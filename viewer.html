<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>シナジー ランキング</title>
<link rel="stylesheet" href="viewer_shared.css?v=39">
</head>
<body>

<nav class="nav">
  <a href="viewer.html" class="active">ランキング</a>
  <a href="summary.html">統計</a>
</nav>


<div class="tabs">
  <div class="tab active" data-mode="taken">Taken (被シナジー)</div>
  <div class="tab" data-mode="given">Given (与シナジー)</div>
</div>

<div class="panel">
  <div class="layout-2col">
    <div class="filters-col">
      <div class="field"><label>零式</label><div class="dropdown" id="f-tier"></div></div>
      <div class="field"><label>ボス</label><div class="dropdown" id="f-boss"></div></div>
      <div class="field" id="job-field"><label>ジョブ</label><div class="dropdown" id="f-job"></div></div>
      <div class="field"><label>シナジー</label><div class="dropdown" id="f-buff"></div></div>
      <div class="field"><label>地域</label><div class="dropdown" id="f-region"></div></div>
      <div class="field"><label>本人/同席</label><div class="dropdown" id="f-own"></div></div>
      <div class="field"><label>プレイヤー検索</label><input type="text" id="f-search" placeholder="名前で検索"></div>
      <div class="field"><label>ジョブ内順位</label>
        <input type="number" id="f-rank-max" min="1" max="100" placeholder="例: 10 (1〜100)">
      </div>
      <div class="field"><label>討伐時間</label>
        <div class="range-pair">
          <input type="number" class="dur-part" id="f-dur-min-m" min="0" placeholder="分">
          <span>:</span>
          <input type="number" class="dur-part" id="f-dur-min-s" min="0" max="59" placeholder="秒">
          <span>〜</span>
          <input type="number" class="dur-part" id="f-dur-max-m" min="0" placeholder="分">
          <span>:</span>
          <input type="number" class="dur-part" id="f-dur-max-s" min="0" max="59" placeholder="秒">
        </div>
      </div>
      <div class="field"><label>編成に含むジョブ</label><div class="dropdown" id="f-comp"></div></div>
    </div>
    <div class="data-col">
      <div class="meta" id="meta"></div>
      <div class="tablewrap"><table id="table"><thead></thead><tbody></tbody></table></div>
    </div>
  </div>
</div>

<script src="viewer_shared.js?v=39"></script>
<script>
const ddTier = createMultiDropdown('f-tier', { single: true });
const ddBoss = createMultiDropdown('f-boss', { single: true });
const ddJob = createMultiDropdown('f-job', { roleGroups: ROLE_GROUPS });
const ddBuff = createMultiDropdown('f-buff');
const ddRegion = createMultiDropdown('f-region');
const ddOwn = createMultiDropdown('f-own');
// 編成フィルターは選択ジョブ全部を含む(AND)前提。さらに侍・暗黒騎士などが編成内に複数人いる場合も
// 絞り込めるよう、ドロップダウン内で各ジョブごとに「何人以上必要か」をクリックで1→2→3→1と切り替えられるようにする(withCounts)。
const ddComp = createMultiDropdown('f-comp', { withCounts: true, maxCount: 2 });
fillMultiDropdown(ddTier, TIERS.map(t => t.key), null, k => TIERS.find(t => t.key === k).label);
fillMultiDropdown(ddOwn, ['True', 'False'], null, v => v === 'True' ? '本人' : '同席');
fillMultiDropdown(ddComp, JOB_ORDER, j => jobMeta(j).icon, j => jobMeta(j).jp);
ddTier.onChange = () => {
  const tier = [...ddTier.values][0];
  const bosses = (TIERS.find(t => t.key === tier)?.bosses || [])
    .filter(b => data.some(r => r.boss === b));
  fillMultiDropdown(ddBoss, bosses, bossIcon, bossJp);
  render();
};
[ddBoss, ddJob, ddBuff, ddRegion, ddOwn, ddComp].forEach(dd => dd.onChange = render);

let mode = 'taken';
let data = [];
const dataCache = { taken: null, given: null };

function applyData(rows) {
  dataCache[mode] = rows;
  data = rows;
  // 初回ロード時: ティアドロップダウンに合わせてボスを絞り込む
  const tier = [...ddTier.values][0] || TIERS[0].key;
  if (!ddTier.values.size) { ddTier.values.add(TIERS[0].key); updateDropdownUI(ddTier); }
  const allBosses = uniqueSorted(data, 'boss').sort((a, b) => BOSS_ORDER.indexOf(a) - BOSS_ORDER.indexOf(b));
  const tierBosses = allBosses.filter(b => tierOfBoss(b) === tier);
  const bosses = tierBosses.length ? tierBosses : allBosses;
  fillMultiDropdown(ddBoss, bosses, bossIcon, bossJp);
  // 与えたシナジー(given)はジョブを一意に決めるので、givenタブではジョブフィルターは不要
  document.getElementById('job-field').style.display = mode === 'given' ? 'none' : '';
  if (mode === 'given') { ddJob.values.clear(); updateDropdownUI(ddJob); }
  const jobs = uniqueSorted(data, 'job').sort((a, b) => jobOrderIndex(a) - jobOrderIndex(b));
  fillMultiDropdown(ddJob, jobs, j => jobMeta(j).icon, j => jobMeta(j).jp);
  const buffCol = mode === 'taken' ? 'buff_received' : 'buff_given';
  const buffs = uniqueSorted(data, buffCol).sort((a, b) => buffJobOrderIndex(a) - buffJobOrderIndex(b));
  fillMultiDropdown(ddBuff, buffs, b => BUFF_ICON[b] || '', buffJp);
  fillMultiDropdown(ddRegion, uniqueSorted(data, 'region').filter(Boolean), null, v => v);
  const ranks = data.map(r => parseInt(r.rank)).filter(n => !isNaN(n));
  const maxRank = ranks.length ? ranks.reduce((a, b) => a > b ? a : b, 0) : null;
  document.getElementById('f-rank-max').placeholder = maxRank ? `例: 10 (最大${maxRank})` : '例: 10';
  const tbl = document.querySelector('#table');
  tbl.style.tableLayout = '';
  tbl.querySelectorAll('thead th').forEach(th => { th.style.width = ''; });
  tbl.style.minWidth = '';
  render();
  requestAnimationFrame(() => {
    tbl.querySelectorAll('thead th').forEach(th => { th.style.width = th.offsetWidth + 'px'; });
    tbl.style.tableLayout = 'fixed';
    tbl.style.minWidth = tbl.offsetWidth + 'px';
  });
}

async function loadMode(m) {
  mode = m;
  if (dataCache[m]) { applyData(dataCache[m]); return; }
  document.getElementById('meta').textContent = '読み込み中...';
  let rows;
  try {
    rows = await fetchCsvRows(m);
  } catch (e) {
    document.getElementById('meta').textContent = '読み込みに失敗しました。start_viewer.bat でローカルサーバーを起動してください。';
    return;
  }
  applyData(rows);
}

['f-search', 'f-rank-max', 'f-dur-min-m', 'f-dur-min-s', 'f-dur-max-m', 'f-dur-max-s'].forEach(id =>
  document.getElementById(id).addEventListener('input', render));

function getDurSec(mId, sId) {
  const m = parseInt(document.getElementById(mId).value);
  const s = parseInt(document.getElementById(sId).value);
  if (isNaN(m) && isNaN(s)) return NaN;
  return (isNaN(m) ? 0 : m) * 60 + (isNaN(s) ? 0 : s);
}

document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  loadMode(tab.dataset.mode);
}));

// ===== テーブル内セルクリックでの絞り込み(クリックした値だけに絞る) =====
function applyTableFilterClick(type, value) {
  if (type === 'job') setDropdownToSingle(ddJob, value);
  else if (type === 'buff') setDropdownToSingle(ddBuff, value);
  else if (type === 'player') document.getElementById('f-search').value = value;
  else if (type === 'comp') {
    if (ddComp.counts.has(value)) { ddComp.counts.delete(value); ddComp.values.delete(value); }
    else { ddComp.counts.set(value, 1); ddComp.values.add(value); }
    updateDropdownUI(ddComp);
  } else if (type === 'comp-dec') {
    if (ddComp.counts.has(value)) {
      const cur = ddComp.counts.get(value);
      if (cur <= 1) { ddComp.counts.delete(value); ddComp.values.delete(value); }
      else ddComp.counts.set(value, cur - 1);
      updateDropdownUI(ddComp);
    }
  } else if (type === 'comp-inc') {
    if (ddComp.counts.has(value)) {
      const cur = ddComp.counts.get(value);
      ddComp.counts.set(value, Math.min(cur + 1, ddComp.maxCount || 3));
    } else {
      ddComp.counts.set(value, 2); ddComp.values.add(value);
    }
    updateDropdownUI(ddComp);
  }
  render();
}

function render() {
  const buffCol = mode === 'taken' ? 'buff_received' : 'buff_given';
  const search = document.getElementById('f-search').value.toLowerCase();
  const rankRaw = parseInt(document.getElementById('f-rank-max').value);
  const rankMax = isNaN(rankRaw) ? NaN : Math.max(1, Math.min(100, rankRaw));
  const durMin = getDurSec('f-dur-min-m', 'f-dur-min-s');
  const durMax = getDurSec('f-dur-max-m', 'f-dur-max-s');

  let rows = data.filter(r => {
    if (ddBoss.values.size && !ddBoss.values.has(r.boss)) return false;
    if (mode === 'taken' && ddJob.values.size && !ddJob.values.has(r.job)) return false;
    if (ddBuff.values.size && !ddBuff.values.has(r[buffCol])) return false;
    if (ddRegion.values.size && !ddRegion.values.has(r.region)) return false;
    if (ddOwn.values.size && !ddOwn.values.has(r.is_own_ranked_log)) return false;
    if (search && !r.player.toLowerCase().includes(search)) return false;
    const rankVal = parseInt(r.rank);
    if (!isNaN(rankMax) && rankVal > rankMax) return false;
    const durVal = parseFloat(r.duration_sec);
    if (!isNaN(durMin) && durVal < durMin) return false;
    if (!isNaN(durMax) && durVal > durMax) return false;
    if (ddComp.counts.size) {
      const compArr = [r.job].concat(r.party_comp_others ? r.party_comp_others.split(',') : []);
      const tally = {};
      compArr.forEach(j => { tally[j] = (tally[j] || 0) + 1; });
      const matches = Array.from(ddComp.counts.entries()).every(([j, n]) => (tally[j] || 0) >= n);
      if (!matches) return false;
    }
    return true;
  });

  rows.sort((x, y) => parseFloat(y.dps_value) - parseFloat(x.dps_value));
  // 現在の絞り込み・並び順における表示順位(参考値、フィルター対象ではない)
  rows.forEach((r, i) => { r._viewRank = i + 1; });

  document.getElementById('meta').textContent = data.length
    ? `${rows.length} 件表示 (全${data.length}件中)`
    : 'CSVファイルを選択してください';

  // taken: シナジーを貰う側 -> そのシナジーで「DPSを返した」量
  // given: シナジーを与える側 -> その付与によって「DPSを返された」量
  const buffLabel = mode === 'taken' ? '被シナジー' : '与シナジー';
  const dpsLabel = 'DPS';
  const cols = mode === 'taken'
    ? [['_viewRank', '表示順位'], ['job', 'ジョブ'], ['player', 'プレイヤー'],
       ['buff_received', buffLabel], ['dps_value', dpsLabel],
       ['is_own_ranked_log', '本人/同席'], ['duration_sec', '討伐時間'], ['party_comp_others', '編成'], ['report', 'リンク']]
    : [['_viewRank', '表示順位'], ['job', 'ジョブ'], ['player', 'プレイヤー'],
       ['buff_given', buffLabel], ['dps_value', dpsLabel],
       ['is_own_ranked_log', '本人/同席'], ['duration_sec', '討伐時間'], ['party_comp_others', '編成'], ['report', 'リンク']];

  const leftCols = new Set(['job', buffCol]);
  const thead = document.querySelector('#table thead');
  thead.innerHTML = '<tr>' + cols.map(([k, label]) =>
    `<th${leftCols.has(k) ? ' class="col-left"' : ''}>${label}</th>`
  ).join('') + '</tr>';

  const buffNameKey = mode === 'taken' ? 'buff_received' : 'buff_given';
  const tbody = document.querySelector('#table tbody');
  const renderLimit = window.innerWidth < 768 ? 100 : 500;
  tbody.innerHTML = rows.slice(0, renderLimit).map(r => {
    const buffName = r[buffNameKey];
    const icon = BUFF_ICON[buffName] || buffIconUrl(r.buff_icon);
    return `<tr>
    <td>${r._viewRank}</td>
    <td class="col-left"><span class="jobrank-cell">${jobChip(r.job)}<span class="badge">#${r.rank}</span></span></td>
    <td class="cell-filter" data-filter-type="player" data-filter-value="${escapeAttr(r.player)}">${r.player}${r.region ? ` <span class="badge">${r.region}</span>` : ''}</td>
    <td class="col-left"><span class="buffchip cell-filter" data-filter-type="buff" data-filter-value="${escapeAttr(buffName)}">${icon ? `<img src="${icon}">` : ''}${buffJp(buffName)}</span></td>
    <td>${parseFloat(r.dps_value).toFixed(1)}</td>
    <td>${ownBadge(r.is_own_ranked_log)}</td>
    <td>${formatDuration(r.duration_sec)}</td>
    <td>${partyCompFullHtml(r.job, r.party_comp_others, ddComp.counts)}</td>
    <td><a href="${reportUrl(r.report_code, r.fight_id)}" target="_blank">ログ</a></td>
  </tr>`;
  }).join('');
  tbody.querySelectorAll('[data-filter-type]').forEach(el => el.addEventListener('click', () => {
    applyTableFilterClick(el.dataset.filterType, el.dataset.filterValue);
  }));
}

loadMode('taken');
</script>

</body>
</html>
